<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Notelikeus — minimal premium notes, synced across devices." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Notelikeus" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Notelikeus</title>
    <script>
      (function () {
        var RECOVERY_KEY = 'notelikeus-build-recovery';
        if (sessionStorage.getItem(RECOVERY_KEY) === '1') return;

        function clearCachesAndReload() {
          sessionStorage.setItem(RECOVERY_KEY, '1');
          var tasks = [];
          if ('serviceWorker' in navigator) {
            tasks.push(
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
              }),
            );
          }
          if ('caches' in window) {
            tasks.push(
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (key) { return caches.delete(key); }));
              }),
            );
          }
          Promise.all(tasks).finally(function () {
            window.location.reload();
          });
        }

        fetch('/build-info.json?ts=' + Date.now(), { cache: 'no-store' })
          .then(function (response) { return response.json(); })
          .then(function (info) {
            if (!info || !info.main) return;
            var script = document.querySelector('script[src*="assets/index-"]');
            var loaded = script && script.getAttribute('src');
            if (!loaded || loaded.indexOf(info.main) !== -1) return;
            clearCachesAndReload();
          })
          .catch(function () {});
      })();
    </script>
  </head>
  <body class="bg-true-black text-brand-primary antialiased">
    <div id="root">
      <div
        id="boot-splash"
        style="
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #000;
          color: #b0b0b0;
          font-family: system-ui, sans-serif;
          text-align: center;
          padding: 24px;
        "
      >
        <p style="font-size: 18px; font-weight: 600; color: #f2f2f2">Notelikeus</p>
        <p style="margin-top: 8px; font-size: 14px">Loading…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
