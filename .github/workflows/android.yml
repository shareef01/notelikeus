name: Android CI

on:
  push:
    branches: [main, master, weiter]
  pull_request:
    branches: [main, master, weiter]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      # No task below compiles androidTest, so the instrumented suite silently drifted out of
      # sync with the composables it tests and stopped compiling. Compiling it here catches that
      # without needing an emulator.
      - name: Compile instrumented tests
        run: ./gradlew :app:compileDebugAndroidTestKotlin --stacktrace

      - name: Run Android lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Build release AAB
        run: ./gradlew :app:bundleRelease --stacktrace
